<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriLens</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NutriLens">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────── -->
<header id="app-header">
  <div class="container">
    <div class="header-inner">
      <h1>NutriLens</h1>
      <div class="date-nav">
        <button id="btn-prev" class="btn-icon" title="Previous day">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"/></svg>
        </button>
        <span id="date-label" class="date-label">Today</span>
        <button id="btn-next" class="btn-icon" title="Next day">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"/></svg>
        </button>
      </div>
      <button id="btn-today" class="btn-today hidden">Today</button>
    </div>
  </div>
</header>

<!-- ── Main ─────────────────────────────────────────────────────── -->
<main>
  <div class="container stack">

    <!-- Macro Summary -->
    <div id="macro-summary" class="card">
      <!-- Rendered by app.js -->
    </div>

    <!-- Meal Sections -->
    <div id="meal-breakfast" class="card meal-card"></div>
    <div id="meal-lunch"     class="card meal-card"></div>
    <div id="meal-dinner"    class="card meal-card"></div>
    <div id="meal-snacks"    class="card meal-card"></div>

    <!-- Micronutrients -->
    <div id="micros-card" class="card"></div>

  </div>
</main>

<!-- ── Bottom Nav ────────────────────────────────────────────────── -->
<nav id="bottom-nav">
  <a href="index.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Diary
  </a>
  <a href="goals.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
    </svg>
    Goals
  </a>
  <a href="settings.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
    Settings
  </a>
</nav>

<!-- ── Food Search Modal ─────────────────────────────────────────── -->
<div id="modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-label="Add food">
  <div id="modal">

    <div class="modal-header">
      <span id="modal-title" class="modal-title">Add Food</span>
      <button id="btn-modal-close" class="btn-close" aria-label="Close">&#10005;</button>
    </div>

    <div class="modal-body">

      <!-- Step 0: Barcode Scanner -->
      <div id="scan-step" style="display:none;flex-direction:column;height:100%">
        <div class="scan-viewport">
          <video id="scan-video" playsinline muted></video>
          <div class="scan-frame">
            <div class="scan-line"></div>
          </div>
        </div>
        <div class="scan-footer">
          <div id="scan-status" class="scan-status">Point camera at a barcode</div>
          <div class="scan-manual">
            <input type="text" id="scan-manual-input" inputmode="numeric" placeholder="Or enter barcode number…" maxlength="14">
            <button id="btn-scan-manual" class="btn-primary" style="padding:9px 14px;font-size:.85rem">Look Up</button>
          </div>
          <div class="scan-actions">
            <label class="btn-scan-file" id="scan-file-label" style="display:none">
              <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/></svg>
              Take Photo
              <input type="file" id="scan-file-input" accept="image/*" capture="environment">
            </label>
            <button id="btn-scan-cancel" class="btn-ghost" style="font-size:.8rem;padding:8px 14px">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Step 1: Search -->
      <div id="search-step">
        <div class="search-input-row">
          <div class="search-input-wrap">
            <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
            </svg>
            <input type="search" id="search-input" placeholder="Search foods…" autocomplete="off" autofocus>
            <div class="search-spinner">
              <div id="search-spinner" class="spinner hidden"></div>
            </div>
          </div>
          <button id="btn-scan" class="btn-scan" title="Scan barcode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
              <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
              <line x1="7" y1="8" x2="7" y2="16"/><line x1="10" y1="8" x2="10" y2="16"/>
              <line x1="13" y1="8" x2="13" y2="16"/><line x1="16" y1="9" x2="16" y2="15" stroke-width="2.5"/>
            </svg>
          </button>
        </div><!-- /.search-input-row -->
        <div id="search-results">
          <div class="search-placeholder">
            <div class="icon">🔍</div>
            <div>Search for any food to get started</div>
            <div style="font-size:.75rem;margin-top:4px;color:var(--text-muted)">Powered by USDA FoodData Central</div>
          </div>
        </div>
        <div class="search-custom-footer">
          <button id="btn-create-food" class="btn-create-food">
            <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"/></svg>
            Create Custom Food
          </button>
        </div>
      </div>

      <!-- Step 2: Serving Editor -->
      <div id="serving-step">
        <div class="serving-back">
          <button id="btn-back" class="btn-back">
            <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"/></svg>
            Back
          </button>
          <span id="serving-food-name" class="serving-food-name"></span>
        </div>
        <div class="serving-form">
          <div class="form-row">
            <div class="form-group">
              <label for="input-grams">Grams per serving</label>
              <input type="number" id="input-grams" value="100" min="1" step="1">
            </div>
            <div class="form-group">
              <label for="input-servings">Number of servings</label>
              <input type="number" id="input-servings" value="1" min="0.1" step="0.1">
            </div>
          </div>
          <div class="label-scan-row">
            <label class="btn-label-scan" id="label-scan-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              Fix from label photo
              <input type="file" id="label-scan-input" accept="image/*" capture="environment" style="display:none">
            </label>
            <span id="label-scan-status" class="label-scan-status"></span>
          </div>
          <div id="total-display" class="total-display"></div>
          <div class="nutrient-preview">
            <div class="preview-title">Nutrition Preview</div>
            <div id="nutrient-preview-grid" class="preview-grid"></div>
          </div>
          <button id="btn-add-confirm" class="btn-add-confirm">Add to Breakfast</button>
        </div>
      </div>

      <!-- Step 3: Create Custom Food -->
      <div id="create-food-step" style="display:none;flex-direction:column;height:100%">
        <div class="serving-back">
          <button id="btn-create-back" class="btn-back">
            <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"/></svg>
            Back
          </button>
          <span class="serving-food-name">Create Custom Food</span>
        </div>
        <div class="create-form">
          <label class="btn-label-scan-lg" id="create-label-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            Scan Nutrition Label to Auto-Fill
            <input type="file" id="create-label-input" accept="image/*" capture="environment" style="display:none">
          </label>
          <div id="create-scan-status" class="label-scan-status" style="display:none;text-align:center"></div>

          <div class="form-group">
            <label for="create-name">Food Name *</label>
            <input type="text" id="create-name" placeholder="e.g. Sour Raspberry Strips" autocomplete="off">
          </div>
          <div class="form-group">
            <label for="create-brand">Brand (optional)</label>
            <input type="text" id="create-brand" placeholder="e.g. Trolli" autocomplete="off">
          </div>
          <div class="form-group">
            <label for="create-serving">Default Serving Size (g)</label>
            <input type="number" id="create-serving" value="100" min="1" step="1">
          </div>

          <div class="create-nutrients-header">Nutrition Values — per 100g</div>
          <div class="create-nutrient-grid">
            <div class="form-group"><label>Calories (kcal)</label><input type="number" id="cn-1008" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Protein (g)</label><input type="number" id="cn-1003" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Carbs (g)</label><input type="number" id="cn-1005" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Fat (g)</label><input type="number" id="cn-1004" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Fiber (g)</label><input type="number" id="cn-1079" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Sodium (mg)</label><input type="number" id="cn-1093" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Calcium (mg)</label><input type="number" id="cn-1087" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Iron (mg)</label><input type="number" id="cn-1089" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Potassium (mg)</label><input type="number" id="cn-1092" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Magnesium (mg)</label><input type="number" id="cn-1090" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Zinc (mg)</label><input type="number" id="cn-1095" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Vitamin A (mcg)</label><input type="number" id="cn-1106" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Vitamin C (mg)</label><input type="number" id="cn-1162" min="0" step="0.1" placeholder="—"></div>
            <div class="form-group"><label>Vitamin D (mcg)</label><input type="number" id="cn-1114" min="0" step="0.1" placeholder="—"></div>
          </div>

          <button id="btn-save-custom" class="btn-add-confirm">Save Food</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/NutriLens/sw.js');
  }
</script>
</body>
</html>
